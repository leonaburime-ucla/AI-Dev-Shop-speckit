name: Skills Librarian Monthly Sync

on:
  schedule:
    - cron: "0 16 1 * *" # Monthly on the 1st at 16:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Skills Librarian sync
        id: sync
        run: |
          set +e
          python3 project-knowledge/skills-inbox/scripts/skills_librarian_sync.py
          code=$?
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          set -e

      - name: Commit staged upstream snapshots and report
        if: steps.sync.outputs.exit_code == '2'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project-knowledge/skills-inbox/external project-knowledge/skills-inbox/state.json reports/skills-audit
          git commit -m "chore(skills-librarian): monthly upstream snapshot update" || exit 0
          git push

      - name: Open issue when review needed
        if: steps.sync.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Skills Librarian review needed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "Monthly upstream skill check detected changes.",
              "",
              "Please run Skills Librarian ingestion review using:",
              "- project-knowledge/skills-inbox/external/",
              "- reports/skills-audit/<date>-monthly-upstream-check.md",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["skills-librarian", "maintenance"]
            });

      - name: Fail on fetch errors
        if: steps.sync.outputs.exit_code == '1'
        run: |
          echo "Upstream fetch errors occurred. Check report for details."
          exit 1
